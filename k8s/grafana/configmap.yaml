apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: mlops
data:
  GF_SERVER_HTTP_PORT: "3000"

  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true

  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: "MLOps"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

  api-dashboard.json: |
    {
