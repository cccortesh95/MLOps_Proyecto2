apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: cccortesh/mlops-mlflow:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri "postgresql+psycopg2://mlflow_user:mlflow1234@mlflow-postgres-service:5432/mlflow_db" \
                --default-artifact-root "s3://mlflow-artifacts/" \
                --allowed-hosts "*"
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: mlflow-config
            - secretRef:
                name: mlflow-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
