apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: mlops
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Esperando a que MinIO esté listo..."
              until wget -qO- http://minio-service:9000/minio/health/ready; do
                echo "MinIO no está listo, reintentando en 3s..."
                sleep 3
              done
              echo "MinIO está listo."
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set mlops_models http://minio-service:9000 minioadmin minioadmin123
              mc mb --ignore-existing mlops_models/mlflow-artifacts
              echo "Bucket mlflow-artifacts creado."
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
